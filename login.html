<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>TimeRight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav class="navbar-principal">
    <div class="logo">TimeRight </div>
    <div class="links">
        <a href="index.html">Início</a>
        <a href="login.html">Entrar</a>
        <a href="cadastro.html">Criar Conta</a>
    </div>
</nav>

    <main class="container">
        <section class="pagina">
            <h1>TimeRight</h1>
            <h2>Login</h2>
            <form id="formLogin">
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="senha" placeholder="Senha" required>
                
                <div class="tipo-usuario">
                    <label><input type="radio" name="tipo" value="admin"> Admin</label>
                    <label><input type="radio" name="tipo" value="user" checked> Cliente</label>
                </div>
                
                <button type="submit">Entrar</button>
            </form>
            <p>Ainda não tem conta? <a href="cadastro.html">Registe-se aqui</a></p>
        </section>
    </main>
<footer>
         <p>&copy; 2026 TimeRight - Todos os direitos reservados.</p>
        <p>Rua da Beleza, 123 - Centro</p>
        <p>Siga-nos: @timeright_</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
